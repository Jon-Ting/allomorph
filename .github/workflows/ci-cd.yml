name: ci-cd

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: PYTHONPATH=./src:./extras uv run pytest tests/ -v --cov=allomorph --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_API_TOKEN }}
          files: ./coverage.xml

      - name: Build documentation
        run: uv run make html --directory docs/

  cd:
    environment: pypi
    permissions:
      id-token: write  # Required for OIDC Trusted Publishing
      contents: write  # Required for Python Semantic Release to push tags/releases
    
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Use Python Semantic Release to prepare release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.16.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to TestPyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@v1.13.0
        
      # Wipe the generated attestations so the next step can generate its own fresh pair
      - name: Clean up TestPyPI Attestations
        if: steps.release.outputs.released == 'true'
        run: rm -f dist/*.attestation

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@v1.13.0
